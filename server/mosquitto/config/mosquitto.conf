persistence true
persistence_location /mosquitto/data/
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
connection_messages true

per_listener_settings true

listener 1883 0.0.0.0
allow_anonymous true

# Security hardening path for the next step:
# 1. switch allow_anonymous to false
# 2. create a password file with mosquitto_passwd
# 3. mount the password file into /mosquitto/config/passwords
# 4. optionally add ACL rules for publish and subscribe topics
# password_file /mosquitto/config/passwords
# acl_file /mosquitto/config/acl
